      // Highlight active nav link
      const path = window.location.pathname.split("/").pop();
      const navMap = {
        "dashboard.html": "nav-dashboard",
        "business-tax.html": "nav-business-tax",
        "market-stall.html": "nav-market-stall",
        "transactions.html": "nav-transactions",
        "payment-gateway.html": "nav-payment-gateway",
        "traffic-fines.html": "nav-traffic-fines",
      };
      if (navMap[path]) {
        document.getElementById(navMap[path])?.classList.add("active");
      }
      // Set user info
      const citizen = JSON.parse(sessionStorage.getItem("citizen") || "{}");
      if (citizen.full_name)
        document.getElementById("nav-name").textContent = citizen.full_name;
