<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>RCTS-QC | Treasury Login</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --navy: #ffffff;
        --navy2: #f5f5f5;
        --gold: #c9a84c;
        --gold2: #e8c878;
        --white: #1a1a1a;
        --muted: #666666;
        --green: #2ecc71;
        --red: #e74c3c;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "DM Sans", sans-serif;
        background: #f5f5f5;
        color: #1a1a1a;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image:
          repeating-linear-gradient(
            45deg,
            transparent,
            transparent 40px,
            rgba(201, 168, 76, 0.03) 40px,
            rgba(201, 168, 76, 0.03) 41px
          ),
          repeating-linear-gradient(
            -45deg,
            transparent,
            transparent 40px,
            rgba(201, 168, 76, 0.03) 40px,
            rgba(201, 168, 76, 0.03) 41px
          );
        pointer-events: none;
        z-index: 0;
      }
      .top-bar {
        position: relative;
        z-index: 10;
        background: var(--gold);
        padding: 7px 32px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .top-bar span {
        font-size: 11px;
        font-weight: 600;
        color: #ffffff;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .top-bar .dot {
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: #ffffff;
        opacity: 0.5;
      }
      .page-wrap {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
        position: relative;
        z-index: 10;
      }
      .login-box {
        width: 100%;
        max-width: 420px;
      }
      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: #666666;
        text-decoration: none;
        margin-bottom: 28px;
        transition: color 0.2s;
      }
      .back-link:hover {
        color: var(--gold);
      }
      .seal {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--gold), var(--gold2));
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        font-weight: 700;
        color: #ffffff;
        font-family: "Playfair Display", serif;
        box-shadow: 0 0 0 3px rgba(201, 168, 76, 0.25);
        margin-bottom: 20px;
      }
      .login-box h1 {
        font-family: "Playfair Display", serif;
        font-size: 26px;
        color: #1a1a1a;
        margin-bottom: 4px;
      }
      .login-box .sub {
        font-size: 13px;
        color: #666666;
        margin-bottom: 32px;
      }
      .login-box .sub span {
        color: var(--gold);
      }
      .form-group {
        margin-bottom: 18px;
      }
      label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        color: #666666;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        margin-bottom: 7px;
      }
      input {
        width: 100%;
        background: #ffffff;
        border: 1px solid #dddddd;
        border-radius: 8px;
        padding: 12px 16px;
        color: #1a1a1a;
        font-family: "DM Sans", sans-serif;
        font-size: 14px;
        outline: none;
        transition: border-color 0.2s;
      }
      input:focus {
        border-color: var(--gold);
      }
      input::placeholder {
        color: #999999;
      }
      .hint {
        font-size: 11px;
        color: #666666;
        margin-top: 6px;
      }
      .hint strong {
        color: #8a6d3b;
      }
      .btn-login {
        width: 100%;
        background: linear-gradient(135deg, var(--gold), var(--gold2));
        border: none;
        border-radius: 8px;
        padding: 14px;
        font-family: "DM Sans", sans-serif;
        font-size: 14px;
        font-weight: 700;
        color: #ffffff;
        cursor: pointer;
        letter-spacing: 0.04em;
        margin-top: 8px;
        transition:
          opacity 0.2s,
          transform 0.15s;
      }
      .btn-login:hover {
        opacity: 0.9;
        transform: translateY(-1px);
      }
      .btn-login:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .alert {
        border-radius: 8px;
        padding: 12px 16px;
        font-size: 13px;
        margin-bottom: 18px;
        display: none;
      }
      .alert.error {
        background: rgba(231, 76, 60, 0.1);
        border: 1px solid rgba(231, 76, 60, 0.3);
        color: #ff8a80;
      }
      .alert.success {
        background: rgba(46, 204, 113, 0.1);
        border: 1px solid rgba(46, 204, 113, 0.3);
        color: var(--green);
      }
      .divider {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 22px 0;
      }
      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: rgba(201, 168, 76, 0.15);
      }
      .divider span {
        font-size: 11px;
        color: #666666;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .demo-accounts {
        background: #ffffff;
        border: 1px solid #dddddd;
        border-radius: 8px;
        padding: 16px;
      }
      .demo-accounts h4 {
        font-size: 11px;
        color: #8a6d3b;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin-bottom: 12px;
      }
      .demo-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 6px 0;
        border-bottom: 1px solid #eeeeee;
        cursor: pointer;
        transition: opacity 0.2s;
      }
      .demo-row:last-child {
        border-bottom: none;
      }
      .demo-row:hover {
        opacity: 0.8;
      }
      .demo-row .name {
        font-size: 12px;
        color: #1a1a1a;
      }
      .demo-row .creds {
        font-size: 11px;
        color: #666666;
      }
      .demo-row .role-tag {
        font-size: 10px;
        padding: 2px 8px;
        border-radius: 10px;
        font-weight: 600;
        letter-spacing: 0.05em;
      }
      .tag-citizen {
        background: rgba(52, 152, 219, 0.2);
        color: #74b9ff;
      }
      .tag-treasurer {
        background: rgba(201, 168, 76, 0.15);
        color: var(--gold);
      }
      .tag-auditor {
        background: rgba(155, 89, 182, 0.2);
        color: #a29bfe;
      }
      .spinner {
        display: none;
        width: 16px;
        height: 16px;
        border: 2px solid #dddddd;
        border-top-color: #1a1a1a;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        margin: 0 auto;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="top-bar">
      <span>RCTS-QC</span>
      <div class="dot"></div>
      <span>Citizen Portal</span>
      <div class="dot"></div>
      <span>Secure Login</span>
    </div>
    <div class="page-wrap">
      <div class="login-box">
        <a class="back-link" href="../../index.html">← Back to Portal Select</a>
        <div class="seal">QC</div>
        <h1>Treasury Portal Login</h1>
        <p class="sub">
          Revenue Collection &amp; Treasury Services — <span>Department 8</span>
        </p>

        <div class="alert error" id="err-msg"></div>
        <div class="alert success" id="ok-msg"></div>

        <div class="form-group">
          <label>Email Address</label>
          <input
            type="email"
            id="email"
            placeholder="your.email@example.com"
            autocomplete="email"
          />
          <div class="hint">
            Registered email linked to your <strong>QCitizen ID</strong>
          </div>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input
            type="password"
            id="password"
            placeholder="Enter your password"
          />
        </div>

        <button class="btn-login" id="login-btn" onclick="doLogin()">
          <span id="btn-text">Sign In to Treasury Portal</span>
          <div class="spinner" id="spinner"></div>
        </button>

        <div class="divider"><span>Demo Accounts</span></div>

        <div class="demo-accounts">
          <h4>Click any row to auto-fill</h4>
          <div
            class="demo-row"
            onclick="fillDemo('treasurer@qc.gov.ph', 'treasurer2025')"
          >
            <div>
              <div class="name">Cheryl Reyes-Macaraeg</div>
              <div class="creds">treasurer@qc.gov.ph</div>
            </div>
            <span class="role-tag tag-treasurer">Treasurer</span>
          </div>
        </div>
      </div>
    </div>

    <script>
      function fillDemo(email, pw) {
        document.getElementById("email").value = email;
        document.getElementById("password").value = pw;
      }

      async function doLogin() {
        const email = document.getElementById("email").value.trim();
        const pass = document.getElementById("password").value;
        const errEl = document.getElementById("err-msg");
        const okEl = document.getElementById("ok-msg");
        const btn = document.getElementById("login-btn");
        const txt = document.getElementById("btn-text");
        const spin = document.getElementById("spinner");

        errEl.style.display = "none";
        okEl.style.display = "none";

        if (!email || !pass) {
          showErr("Please enter both email and password.");
          return;
        }

        btn.disabled = true;
        txt.style.display = "none";
        spin.style.display = "block";

        try {
          const url = `../../mock-data/subsystem1/citizen-registry-api.php?action=verify_login&email=${encodeURIComponent(email)}&password=${encodeURIComponent(pass)}`;
          const res = await fetch(url);
          const data = await res.json();

          if (!data.success) {
            showErr(data.message || "Login failed.");
            return;
          }

          const citizen = data.data;

          // Check if role is allowed for treasury portal
          const allowedRoles = ["treasurer", "revenue_officer", "admin"];
          if (!allowedRoles.includes(citizen.role)) {
            showErr("Access denied. This portal is for treasury staff only.");
            return;
          }

          sessionStorage.setItem("rcts_citizen", JSON.stringify(citizen));
          sessionStorage.setItem("rcts_token", citizen.login_token);

          okEl.textContent =
            "Login successful! Redirecting to Treasury Dashboard...";
          okEl.style.display = "block";

          setTimeout(() => {
            window.location.href = "dashboard.html";
          }, 900);
        } catch (e) {
          showErr(
            "Could not connect to authentication service. Make sure XAMPP is running.",
          );
        } finally {
          btn.disabled = false;
          txt.style.display = "block";
          spin.style.display = "none";
        }
      }

      function showErr(msg) {
        const el = document.getElementById("err-msg");
        el.textContent = msg;
        el.style.display = "block";
      }

      document.getElementById("password").addEventListener("keydown", (e) => {
        if (e.key === "Enter") doLogin();
      });
    </script>
  </body>
</html>
