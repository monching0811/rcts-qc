    <script>
      // Admin check
      const citizen = JSON.parse(
        sessionStorage.getItem("rcts_citizen") || "{}",
      );
      if (citizen.role !== "admin") {
        alert("Access denied. Admin access required.");
        window.location.href = "../../index.html";
      }

      const token = citizen.login_token || citizen.qcitizen_id;
      const AUTH_HEADER = { Authorization: `Bearer ${token}` };

      function apiCall(action, method = "GET", body = null) {
        const url = `../../api/endpoints/admin.php?action=${action}`;

        const options = {
          method,
          headers: AUTH_HEADER,
        };

        if (body && method === "POST") {
          const formData = new FormData();
          formData.append("action", action);
          for (const [key, value] of Object.entries(body)) {
            formData.append(key, value);
          }
          options.body = formData;
        }

        return fetch(url, options).then((r) => r.json());
      }

      // Load Users
      async function loadUsers() {
        try {
          const data = await apiCall("list_users");
          if (!data.success)
            throw new Error(data.message || "Failed to load users");

          let html = `<table class="table">
            <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody>`;

          for (const u of data.users) {
            html += `<tr>
              <td>${u.full_name}</td>
              <td>${u.email}</td>
              <td><span class="text-muted">${u.role}</span></td>
              <td>${u.status}</td>
              <td>
                <button class="btn btn-small" onclick="openResetPasswordModal('${u.qcitizen_id}', '${u.full_name}')">Reset PW</button>
                <button class="btn btn-small btn-danger" onclick="deleteUser('${u.qcitizen_id}', '${u.full_name}')">Delete</button>
              </td>
            </tr>`;
          }
          html += `</tbody></table>`;
          document.getElementById("users-container").innerHTML = html;
        } catch (e) {
          document.getElementById("users-container").innerHTML =
            `<div class="alert alert-error">Error: ${e.message}</div>`;
        }
      }

      // Add User
      function showAddUserModal() {
        document.getElementById("addUserModal").classList.add("show");
      }
      function closeAddUserModal() {
        document.getElementById("addUserModal").classList.remove("show");
        document.getElementById("addUserName").value = "";
        document.getElementById("addUserEmail").value = "";
        document.getElementById("addUserPassword").value = "";
        document.getElementById("addUserError").style.display = "none";
        document.getElementById("addUserSuccess").style.display = "none";
      }
      async function addUser() {
        const name = document.getElementById("addUserName").value;
        const email = document.getElementById("addUserEmail").value;
        const role = document.getElementById("addUserRole").value;
        const password = document.getElementById("addUserPassword").value;

        if (!name || !email || !password) {
          showError("addUserError", "Please fill in all fields");
          return;
        }

        try {
          const data = await apiCall("add_user", "POST", {
            name,
            email,
            role,
            password,
          });
          if (!data.success)
            throw new Error(data.message || "Failed to add user");

          showSuccess("addUserSuccess", "User created successfully");
          setTimeout(() => {
            closeAddUserModal();
            loadUsers();
          }, 1000);
        } catch (e) {
          showError("addUserError", e.message);
        }
      }
      async function deleteUser(id, name) {
        if (!confirm(`Delete user "${name}"?`)) return;
        try {
          const data = await apiCall("delete_user", "POST", {
            qcitizen_id: id,
          });
          if (!data.success)
            throw new Error(data.message || "Failed to delete user");
          loadUsers();
        } catch (e) {
          alert("Error: " + e.message);
        }
      }

      // Reset Password
      let resetUserId = "";
      function openResetPasswordModal(id, name) {
        resetUserId = id;
        document.getElementById("resetUserInfo").textContent =
          `Resetting password for: ${name}`;
        document.getElementById("resetPasswordModal").classList.add("show");
        document.getElementById("resetPassword").value = "";
      }
      function closeResetPasswordModal() {
        document.getElementById("resetPasswordModal").classList.remove("show");
        document.getElementById("resetError").style.display = "none";
        document.getElementById("resetSuccess").style.display = "none";
      }
      async function confirmResetPassword() {
        const password = document.getElementById("resetPassword").value;
        if (!password) {
          showError("resetError", "Password cannot be empty");
          return;
        }
        try {
          const data = await apiCall("reset_password", "POST", {
            qcitizen_id: resetUserId,
            password,
          });
          if (!data.success)
            throw new Error(data.message || "Failed to reset password");
          showSuccess("resetSuccess", "Password reset successfully");
          setTimeout(() => {
            closeResetPasswordModal();
            loadUsers();
          }, 1000);
        } catch (e) {
          showError("resetError", e.message);
        }
      }

      // Load Settings
      async function loadSettings() {
        try {
          const data = await apiCall("list_settings");
          if (!data.success)
            throw new Error(data.message || "Failed to load settings");

          let html = `<form id="settingsForm" onsubmit="saveSettings(event)">`;
          for (const s of data.settings) {
            html += `<div class="form-group">
              <label>${s.key}</label>
              <input type="number" step="0.0001" name="${s.key}" value="${s.value}" required />
            </div>`;
          }
          html += `<button class="btn" type="submit">Save Settings</button></form>`;
          document.getElementById("settings-container").innerHTML = html;
        } catch (e) {
          document.getElementById("settings-container").innerHTML =
            `<div class="alert alert-error">Error: ${e.message}</div>`;
        }
      }
      async function saveSettings(e) {
        e.preventDefault();
        const formData = new FormData(e.target);
        const body = {};
        formData.forEach((v, k) => (body[k] = parseFloat(v)));

        try {
          const data = await apiCall("save_settings", "POST", body);
          if (!data.success)
            throw new Error(data.message || "Failed to save settings");
          alert("Settings saved successfully");
          loadSettings();
        } catch (e) {
          alert("Error: " + e.message);
        }
      }

      // Load Logs
      let logsData = [];
      async function loadLogs() {
        try {
          const data = await apiCall("list_logs");
          if (!data.success)
            throw new Error(data.message || "Failed to load logs");

          logsData = data.logs;
          let html = `<div style="max-height: 300px; overflow-y: auto;">`;
          for (const log of data.logs) {
            html += `<div style="padding: 8px 0; border-bottom: 1px solid var(--border-color); font-size: 13px;">
              <span class="text-muted">${log.ts}</span> - ${log.event}
            </div>`;
          }
          html += `</div>`;
          document.getElementById("logs-container").innerHTML = html;
        } catch (e) {
          document.getElementById("logs-container").innerHTML =
            `<div class="alert alert-error">Error: ${e.message}</div>`;
        }
      }
      function exportLogs() {
        if (!logsData.length) {
          alert("No logs to export");
          return;
        }
        let csv = "Timestamp,Event\n";
        for (const log of logsData) {
          csv += `"${log.ts}","${log.event.replace(/"/g, '""')}"\n`;
        }
        const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `audit-logs-${new Date().toISOString().split("T")[0]}.csv`;
        link.click();
      }

      // Load Rule Changes
      async function loadRuleLog() {
        try {
          const data = await apiCall("rule_log");
          if (!data.success)
            throw new Error(data.message || "Failed to load rule log");

          let html = `<ul style="margin-left: 20px;">`;
          for (const r of data.log) {
            html += `<li style="margin-bottom: 8px; line-height: 1.6;">
              <span class="text-muted">${r.ts}</span> - <strong>${r.user}</strong><br/>
              <span class="text-muted" style="font-size: 12px;">${r.change}</span>
            </li>`;
          }
          html += `</ul>`;
          document.getElementById("rules-container").innerHTML = html;
        } catch (e) {
          document.getElementById("rules-container").innerHTML =
            `<div class="alert alert-error">Error: ${e.message}</div>`;
        }
      }

      // Load API Keys
      async function loadApiKeys() {
        try {
          const data = await apiCall("list_apikeys");
          if (!data.success)
            throw new Error(data.message || "Failed to load API keys");

          let html = `<table class="table">
            <thead><tr><th>Subsystem</th><th>API Key</th><th>Actions</th></tr></thead>
            <tbody>`;

          for (const k of data.keys) {
            html += `<tr>
              <td><strong>${k.subsystem}</strong></td>
              <td><code style="font-size: 11px;">${k.key}</code></td>
              <td><button class="btn btn-small" onclick="regenApiKey('${k.subsystem}')">Regenerate</button></td>
            </tr>`;
          }
          html += `</tbody></table>`;
          document.getElementById("apikeys-container").innerHTML = html;
        } catch (e) {
          document.getElementById("apikeys-container").innerHTML =
            `<div class="alert alert-error">Error: ${e.message}</div>`;
        }
      }
      async function regenApiKey(subsystem) {
        if (!confirm(`Regenerate API key for ${subsystem}?`)) return;
        try {
          const data = await apiCall("regen_apikey", "POST", { subsystem });
          if (!data.success)
            throw new Error(data.message || "Failed to regenerate key");
          alert(`New key: ${data.key}`);
          loadApiKeys();
        } catch (e) {
          alert("Error: " + e.message);
        }
      }

      // Helper functions
      function showError(elementId, message) {
        const el = document.getElementById(elementId);
        el.textContent = message;
        el.style.display = "block";
      }
      function showSuccess(elementId, message) {
        const el = document.getElementById(elementId);
        el.textContent = message;
        el.style.display = "block";
      }

      // Initial load
      window.addEventListener("load", () => {
        loadUsers();
        loadSettings();
        loadLogs();
        loadRuleLog();
        loadApiKeys();
      });

      // Close modals on backdrop click
      document.addEventListener("click", (e) => {
        if (e.target.id === "addUserModal") closeAddUserModal();
        if (e.target.id === "resetPasswordModal") closeResetPasswordModal();
      });
    </script>
