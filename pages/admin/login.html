<!doctype html>
<html lang="en">
  <head>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>RCTS-QC | Admin Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <style>
      :root {
        --gold: #c9a84c; --gold2: #e8c878;
        --green: #2ecc71; --red: #e74c3c;
      }
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: "DM Sans", sans-serif;
        background: #f5f5f5; color: #1a1a1a;
        min-height: 100vh; display: flex; flex-direction: column;
      }
      body::before {
        content: ""; position: fixed; inset: 0;
        background-image:
          repeating-linear-gradient(45deg, transparent, transparent 40px, rgba(201,168,76,0.03) 40px, rgba(201,168,76,0.03) 41px),
          repeating-linear-gradient(-45deg, transparent, transparent 40px, rgba(201,168,76,0.03) 40px, rgba(201,168,76,0.03) 41px);
        pointer-events: none; z-index: 0;
      }
      .top-bar {
        position: relative; z-index: 10;
        background: var(--gold); padding: 7px 32px;
        display: flex; align-items: center; gap: 10px;
      }
      .top-bar span { font-size: 11px; font-weight: 600; color: #fff; letter-spacing: .08em; text-transform: uppercase; }
      .top-bar .dot { width: 4px; height: 4px; border-radius: 50%; background: #fff; opacity: .5; }
      .page-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; position: relative; z-index: 10; }
      .login-box { width: 100%; max-width: 420px; }
      .back-link { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: #666; text-decoration: none; margin-bottom: 28px; transition: color .2s; }
      .back-link:hover { color: var(--gold); }
      .seal {
        width: 56px; height: 56px; border-radius: 50%;
        background: linear-gradient(135deg, var(--gold), var(--gold2));
        display: flex; align-items: center; justify-content: center;
        font-size: 22px; font-weight: 700; color: #fff;
        box-shadow: 0 0 0 3px rgba(201,168,76,.25); margin-bottom: 20px;
      }
      h1 { font-family: "Playfair Display", serif; font-size: 26px; color: #1a1a1a; margin-bottom: 4px; }
      .sub { font-size: 13px; color: #666; margin-bottom: 32px; }
      .sub span { color: var(--gold); }
      .form-group { margin-bottom: 18px; }
      label { display: block; font-size: 12px; font-weight: 600; color: #666; letter-spacing: .06em; text-transform: uppercase; margin-bottom: 7px; }
      input {
        width: 100%; background: #fff; border: 1px solid #ddd; border-radius: 8px;
        padding: 12px 16px; color: #1a1a1a; font-family: "DM Sans", sans-serif;
        font-size: 14px; outline: none; transition: border-color .2s;
      }
      input:focus { border-color: var(--gold); }
      input::placeholder { color: #999; }
      /* OTP input special styling */
      #otp-input {
        font-family: "Roboto Mono", "Courier New", monospace;
        font-size: 28px; letter-spacing: .35em; text-align: center;
        padding: 16px; border: 2px solid #ddd;
      }
      #otp-input:focus { border-color: var(--gold); }
      .btn-login {
        width: 100%; background: linear-gradient(135deg, var(--gold), var(--gold2));
        border: none; border-radius: 8px; padding: 14px;
        font-family: "DM Sans", sans-serif; font-size: 14px; font-weight: 700;
        color: #fff; cursor: pointer; letter-spacing: .04em; margin-top: 8px;
        transition: opacity .2s, transform .15s;
      }
      .btn-login:hover { opacity: .9; transform: translateY(-1px); }
      .btn-login:disabled { opacity: .5; cursor: not-allowed; transform: none; }
      .btn-secondary {
        width: 100%; background: transparent; border: 1px solid #ddd; border-radius: 8px;
        padding: 12px; font-family: "DM Sans", sans-serif; font-size: 13px; font-weight: 500;
        color: #666; cursor: pointer; margin-top: 10px; transition: border-color .2s, color .2s;
      }
      .btn-secondary:hover { border-color: var(--gold); color: var(--gold); }
      .btn-secondary:disabled { opacity: .4; cursor: not-allowed; }
      .alert { border-radius: 8px; padding: 12px 16px; font-size: 13px; margin-bottom: 18px; display: none; }
      .alert.error { background: rgba(231,76,60,.1); border: 1px solid rgba(231,76,60,.3); color: #e74c3c; }
      .alert.success { background: rgba(46,204,113,.1); border: 1px solid rgba(46,204,113,.3); color: var(--green); }
      .alert.warning { background: rgba(243,156,18,.1); border: 1px solid rgba(243,156,18,.3); color: #e67e22; }
      .attempts-bar {
        display: none; margin-bottom: 16px;
        background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 10px 14px;
        font-size: 12px; color: #666;
      }
      .attempts-bar .dots { display: flex; gap: 6px; margin-top: 6px; }
      .attempts-bar .dot-attempt {
        width: 10px; height: 10px; border-radius: 50%;
        background: #eee; border: 1px solid #ddd; transition: background .3s;
      }
      .attempts-bar .dot-attempt.used { background: #e74c3c; border-color: #e74c3c; }
      /* OTP resend countdown */
      .resend-info { font-size: 12px; color: #888; text-align: center; margin-top: 10px; }
      .resend-info a { color: var(--gold); cursor: pointer; text-decoration: underline; }
      /* Step indicator */
      .step-indicator {
        display: flex; gap: 8px; align-items: center; margin-bottom: 20px;
      }
      .step-dot { width: 8px; height: 8px; border-radius: 50%; background: #ddd; transition: background .3s; }
      .step-dot.active { background: var(--gold); }
      .step-dot.done { background: var(--green); }
      .spinner {
        display: none; width: 16px; height: 16px;
        border: 2px solid rgba(255,255,255,.4); border-top-color: #fff;
        border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div class="top-bar">
      <span>RCTS-QC</span><div class="dot"></div>
      <span>Admin Portal</span><div class="dot"></div>
      <span>System Administration</span>
    </div>
    <div class="page-wrap">
      <div class="login-box">
        <a class="back-link" href="../../index.html">← Back to Portal Select</a>
        <div class="seal">⚙️</div>
        <h1>Admin Portal Login</h1>
        <p class="sub">Treasury System Administration — <span>Department 8</span></p>

        <!-- Step indicator -->
        <div class="step-indicator">
          <div class="step-dot active" id="step1-dot"></div>
          <div style="flex:1;height:1px;background:#eee;"></div>
          <div class="step-dot" id="step2-dot"></div>
        </div>

        <div class="alert error"   id="err-msg"></div>
        <div class="alert success" id="ok-msg"></div>
        <div class="alert warning" id="warn-msg"></div>

        <!-- Attempt tracker -->
        <div class="attempts-bar" id="attempts-bar">
          <span id="attempts-text">Failed attempts this session</span>
          <div class="dots" id="attempts-dots"></div>
        </div>

        <!-- ── STEP 1: Email + Password ── -->
        <div id="step-credentials">
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="your.email@example.com" autocomplete="email" />
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter your password" />
          </div>
          <button class="btn-login" id="login-btn" onclick="doLogin()">
            <span id="btn-text">Sign In to Admin Panel</span>
            <div class="spinner" id="spinner"></div>
          </button>
        </div>

        <!-- ── STEP 2: OTP Verification ── -->
        <div id="step-otp" style="display:none;">
          <p style="font-size:13px;color:#666;margin-bottom:20px;">
            A 6-digit verification code has been sent to <strong id="otp-email-display"></strong>.
            Enter it below to complete sign-in.
          </p>
          <div class="form-group">
            <label>Verification Code</label>
            <input type="text" id="otp-input" maxlength="6" placeholder="000000"
              inputmode="numeric" pattern="\d{6}" autocomplete="one-time-code" />
          </div>
          <button class="btn-login" id="otp-btn" onclick="doVerifyOtp()">
            <span id="otp-btn-text">Verify Code</span>
            <div class="spinner" id="otp-spinner"></div>
          </button>
          <button class="btn-secondary" id="resend-btn" onclick="resendOtp()" disabled>
            Resend Code
          </button>
          <p class="resend-info" id="resend-countdown"></p>
          <p class="resend-info" style="margin-top:8px;">
            <a onclick="backToCredentials()">← Use a different account</a>
          </p>
        </div>
      </div>
    </div>

    <script>
      let pendingStaff = null;  // holds staff data between step 1 and step 2
      let failedAttempts = 0;
      let resendTimer = null;
      const MAX_VISIBLE_ATTEMPTS = 5;

      // ── Step 1: Validate credentials ─────────────────────────────────────────
      async function doLogin() {
        const email = document.getElementById('email').value.trim();
        const pass  = document.getElementById('password').value;
        clearAlerts();

        if (!email || !pass) { showErr('Please enter both email and password.'); return; }

        setLoading('login-btn', 'btn-text', 'spinner', true);

        try {
          const fd = new FormData();
          fd.append('email', email);
          fd.append('password', pass);

          const res  = await fetch('../../api/endpoints/internal-user-auth.php', { method: 'POST', body: fd });
          const data = await res.json();

          if (!data.success) {
            failedAttempts++;
            updateAttemptsBar(failedAttempts);
            if (data.locked) {
              showErr(data.message);
            } else {
              showErr(data.message || 'Login failed.');
            }
            return;
          }

          // Admins only on this portal
          if (data.pending_staff && data.pending_staff.role !== 'admin') {
            showErr('Access denied. Admin access only.');
            return;
          }

          if (data.otp_required) {
            pendingStaff = data.pending_staff;

            // Trigger OTP send
            const otpFd = new FormData();
            otpFd.append('email', email);
            otpFd.append('purpose', 'login');
            await fetch('../../api/endpoints/otp-send.php', { method: 'POST', body: otpFd });

            showOtpStep(email);
          } else {
            // OTP disabled — finalize session directly
            finalizeSession(data.data);
          }

        } catch (e) {
          showErr('Could not connect to authentication service. Make sure XAMPP is running.');
        } finally {
          setLoading('login-btn', 'btn-text', 'spinner', false);
        }
      }

      // ── Step 2: Verify OTP ────────────────────────────────────────────────────
      async function doVerifyOtp() {
        const email = document.getElementById('email').value.trim();
        const otp   = document.getElementById('otp-input').value.trim();
        clearAlerts();

        if (otp.length !== 6 || !/^\d{6}$/.test(otp)) {
          showErr('Please enter the 6-digit code from your email.');
          return;
        }

        setLoading('otp-btn', 'otp-btn-text', 'otp-spinner', true);

        try {
          const fd = new FormData();
          fd.append('email', email);
          fd.append('otp', otp);
          fd.append('purpose', 'login');

          const res  = await fetch('../../api/endpoints/otp-verify.php', { method: 'POST', body: fd });
          const data = await res.json();

          if (!data.success) {
            showErr(data.message || 'Invalid code. Please try again.');
            return;
          }

          // OTP verified — finalize session
          finalizeSession(pendingStaff);

        } catch (e) {
          showErr('Could not verify code. Make sure XAMPP is running.');
        } finally {
          setLoading('otp-btn', 'otp-btn-text', 'otp-spinner', false);
        }
      }

      // ── Resend OTP ────────────────────────────────────────────────────────────
      async function resendOtp() {
        const email = document.getElementById('email').value.trim();
        clearAlerts();
        document.getElementById('resend-btn').disabled = true;

        try {
          const fd = new FormData();
          fd.append('email', email);
          fd.append('purpose', 'login');
          const res  = await fetch('../../api/endpoints/otp-send.php', { method: 'POST', body: fd });
          const data = await res.json();
          if (data.success) {
            showWarn('A new code has been sent to your email.');
            document.getElementById('otp-input').value = '';
            startResendCountdown(60);
          } else {
            showErr(data.message || 'Could not resend code.');
          }
        } catch (e) {
          showErr('Could not resend code. Make sure XAMPP is running.');
        }
      }

      // ── Finalize session after both steps pass ────────────────────────────────
      async function finalizeSession(staff) {
        sessionStorage.setItem('rcts_citizen', JSON.stringify(staff));
        sessionStorage.setItem('rcts_token', staff.login_token);
        document.cookie = `rcts_citizen=${encodeURIComponent(JSON.stringify(staff))}; path=/; max-age=3600; SameSite=Lax`;

        // Audit log
        try {
          await fetch('../../api/endpoints/audit-log.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              actor:   staff.full_name || staff.email,
              event:   'login',
              details: { email: staff.email, role: staff.role, id: staff.user_id },
            }),
          });
        } catch (e) {}

        showOk('Login successful! Redirecting...');
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 900);
      }

      // ── UI helpers ────────────────────────────────────────────────────────────
      function showOtpStep(email) {
        document.getElementById('step-credentials').style.display = 'none';
        document.getElementById('step-otp').style.display = 'block';
        document.getElementById('otp-email-display').textContent = maskEmail(email);
        document.getElementById('step1-dot').className = 'step-dot done';
        document.getElementById('step2-dot').className = 'step-dot active';
        document.getElementById('otp-input').focus();
        startResendCountdown(60); // allow resend after 60 seconds
      }

      function backToCredentials() {
        document.getElementById('step-credentials').style.display = 'block';
        document.getElementById('step-otp').style.display = 'none';
        document.getElementById('step1-dot').className = 'step-dot active';
        document.getElementById('step2-dot').className = 'step-dot';
        clearAlerts();
        pendingStaff = null;
        if (resendTimer) clearInterval(resendTimer);
      }

      function startResendCountdown(seconds) {
        const btn = document.getElementById('resend-btn');
        const info = document.getElementById('resend-countdown');
        btn.disabled = true;
        let remaining = seconds;
        if (resendTimer) clearInterval(resendTimer);
        resendTimer = setInterval(() => {
          remaining--;
          info.textContent = `Resend available in ${remaining}s`;
          if (remaining <= 0) {
            clearInterval(resendTimer);
            btn.disabled = false;
            info.textContent = '';
          }
        }, 1000);
      }

      function updateAttemptsBar(count) {
        const bar  = document.getElementById('attempts-bar');
        const dots = document.getElementById('attempts-dots');
        const txt  = document.getElementById('attempts-text');
        bar.style.display = 'block';
        dots.innerHTML = '';
        for (let i = 0; i < MAX_VISIBLE_ATTEMPTS; i++) {
          const d = document.createElement('div');
          d.className = 'dot-attempt' + (i < count ? ' used' : '');
          dots.appendChild(d);
        }
        const remaining = MAX_VISIBLE_ATTEMPTS - count;
        txt.textContent = remaining > 0
          ? `${count} failed attempt${count > 1 ? 's' : ''} — ${remaining} remaining before lockout`
          : 'Account locked. Too many failed attempts.';
      }

      function maskEmail(email) {
        const [user, domain] = email.split('@');
        return user.slice(0, 2) + '*'.repeat(Math.max(0, user.length - 2)) + '@' + domain;
      }

      function setLoading(btnId, txtId, spinId, on) {
        document.getElementById(btnId).disabled = on;
        document.getElementById(txtId).style.display = on ? 'none' : 'inline';
        document.getElementById(spinId).style.display = on ? 'block' : 'none';
      }

      function clearAlerts() {
        ['err-msg','ok-msg','warn-msg'].forEach(id => {
          const el = document.getElementById(id);
          el.style.display = 'none'; el.textContent = '';
        });
      }
      function showErr(msg)  { const el = document.getElementById('err-msg');  el.textContent = msg; el.style.display = 'block'; }
      function showOk(msg)   { const el = document.getElementById('ok-msg');   el.textContent = msg; el.style.display = 'block'; }
      function showWarn(msg) { const el = document.getElementById('warn-msg'); el.textContent = msg; el.style.display = 'block'; }

      // Enter key support
      document.addEventListener('keydown', e => {
        if (e.key !== 'Enter') return;
        const otpVisible = document.getElementById('step-otp').style.display !== 'none';
        if (otpVisible) doVerifyOtp(); else doLogin();
      });
    </script>
  </body>
</html>
